services:
  # Local PostgreSQL service - comment out when using external database
  # db:
  #   image: postgres:16-alpine
  #   container_name: edupanel-db
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_USER: postgres
  #     POSTGRES_PASSWORD: postgres
  #     POSTGRES_DB: school_management
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #     - ./backend/sql/001_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
  #     - ./backend/sql/002_seed.sql:/docker-entrypoint-initdb.d/002_seed.sql:ro
  #   ports:
  #     - "5432:5432"
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U postgres -d school_management"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edupanel-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: ${APP_ENV:-production}
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-false}
    volumes:
      - upload_data:/app/uploads
    expose:
      - "5006"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5006/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edupanel-worker
    restart: unless-stopped
    command: python -m app.infrastructure.notifications.outbox_worker
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: ${APP_ENV:-production}
    depends_on:
      # db:
      #   condition: service_healthy
      backend:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: edupanel-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: edupanel-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  upload_data:
