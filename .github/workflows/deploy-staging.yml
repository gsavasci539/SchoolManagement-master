name: Deploy Staging

on:
  push:
    branches: [develop]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "Deploy staging - configure SSH/k8s target in repository secrets"
          echo "Steps: pull images, alembic upgrade head, restart containers, health check"

      - name: Run migrations
        run: echo "alembic upgrade head"

      - name: Health check
        run: |
          echo "curl -f https://staging.example.com/health"
          echo "curl -f https://staging.example.com/ready"
